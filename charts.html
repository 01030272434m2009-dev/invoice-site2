<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📊 الرسوم البيانية للمبيعات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:'Cairo',sans-serif;
    background:#f2f4f7;
    margin:0;
    padding:20px;
    direction:rtl;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
    color:#1976D2;
    margin-bottom:25px;
}
.chart-section{
    background:white;
    padding:20px;
    margin-bottom:25px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
.chart-section h2{
    margin-bottom:15px;
    color:#1976D2;
}
canvas{
    background:#fafafa;
    border-radius:10px;
}
.stats-cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
    text-align:center;
}
.card i{
    font-size:28px;
    margin-bottom:8px;
    color:#1976D2;
}
.card h3{
    margin:5px;
    color:#1976D2;
}
.card span{
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>
<div class="container">
<h1><i class="fa-solid fa-chart-pie"></i> الرسوم البيانية للمبيعات</h1>

<div class="stats-cards">
<div class="card"><i class="fa-solid fa-cubes"></i><h3>عدد الأصناف</h3><span id="itemsCount">0</span></div>
<div class="card"><i class="fa-solid fa-layer-group"></i><h3>إجمالي الكمية</h3><span id="totalQty">0</span></div>
<div class="card"><i class="fa-solid fa-money-bill-wave"></i><h3>إجمالي الكاش</h3><span id="cashTotal">0</span></div>
<div class="card"><i class="fa-solid fa-credit-card"></i><h3>إجمالي الإلكتروني</h3><span id="elecTotal">0</span></div>
<div class="card"><i class="fa-solid fa-sack-dollar"></i><h3>إجمالي البيع</h3><span id="salesTotal">0</span></div>
<div class="card"><i class="fa-solid fa-chart-line"></i><h3>إجمالي الأرباح</h3><span id="profitTotal">0</span></div>
</div>

<div class="chart-section">
<h2><i class="fa-solid fa-fire"></i> أفضل 5 أصناف</h2>
<canvas id="topItemsChart" height="150"></canvas>
</div>

<div class="chart-section">
<h2><i class="fa-solid fa-chart-simple"></i> نسبة المبيعات لكل صنف</h2>
<canvas id="salesPieChart" height="150"></canvas>
</div>

<div class="chart-section">
<h2><i class="fa-solid fa-calendar"></i> تحليل المبيعات بالشهور</h2>
<canvas id="monthlyChart" height="150"></canvas>
</div>
</div>

<script>
// ==== استدعاء البيانات ====
let salesData = [];

// أولاً حاول نقرأ من localStorage
const storedData = localStorage.getItem("salesData");
if(storedData){
    try{ salesData = JSON.parse(storedData); } catch(e){ console.error(e); }
}

// إذا لم توجد، حاول من ?data=
if(salesData.length===0){
    const urlData = new URLSearchParams(window.location.search).get('data');
    if(urlData){
        try{
            const jsonStr = decodeURIComponent(atob(urlData));
            salesData = JSON.parse(jsonStr);
        }catch(e){ console.error("خطأ في فك البيانات:", e); }
    }
}

// إذا لا توجد بيانات
if(salesData.length===0){
    alert("لا توجد بيانات للعرض!");
} else {
    // احصائيات عامة
    let totalQty=0, totalSales=0, totalProfit=0, cashTotal=0, elecTotal=0;
    salesData.forEach(item=>{
        let qty=parseFloat(item.qty)||0;
        let total=parseFloat(item.total)||0;
        let profit=parseFloat(item.profit)||0;
        totalQty+=qty; totalSales+=total; totalProfit+=profit;
        let payment=(item.payment||"").toLowerCase();
        if(payment=="cash"||payment=="كاش") cashTotal+=total;
        else elecTotal+=total;
    });

    document.getElementById("itemsCount").innerText = salesData.length;
    document.getElementById("totalQty").innerText = totalQty;
    document.getElementById("salesTotal").innerText = totalSales.toFixed(2)+" ج";
    document.getElementById("profitTotal").innerText = totalProfit.toFixed(2)+" ج";
    document.getElementById("cashTotal").innerText = cashTotal.toFixed(2)+" ج";
    document.getElementById("elecTotal").innerText = elecTotal.toFixed(2)+" ج";

    // ===== أفضل 5 أصناف =====
    const topItems = [...salesData].sort((a,b)=>parseFloat(b.total)-parseFloat(a.total)).slice(0,5);
    new Chart(document.getElementById("topItemsChart"),{
        type:'bar',
        data:{
            labels: topItems.map(i=>i.name),
            datasets:[{label:'إجمالي البيع', data:topItems.map(i=>i.total), backgroundColor:'#FF5722'}]
        },
        options:{
            responsive:true,
            plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:true}}
        }
    });

    // ===== رسم دائري لنسبة المبيعات =====
    new Chart(document.getElementById("salesPieChart"),{
        type:'pie',
        data:{
            labels: salesData.map(i=>i.name),
            datasets:[{
                data: salesData.map(i=>i.total),
                backgroundColor: salesData.map(()=>`hsl(${Math.random()*360},70%,60%)`)
            }]
        },
        options:{responsive:true, plugins:{legend:{position:'right'}}}
    });

    // ===== تحليل بالشهور =====
    const monthlyTotals = {};
    salesData.forEach(item=>{
        const dateStr = item.date || item.CreatedAt || new Date().toISOString();
        const month = new Date(dateStr).toLocaleString('ar-EG',{month:'short',year:'numeric'});
        if(!monthlyTotals[month]) monthlyTotals[month]=0;
        monthlyTotals[month]+=parseFloat(item.total)||0;
    });

    new Chart(document.getElementById("monthlyChart"),{
        type:'line',
        data:{
            labels:Object.keys(monthlyTotals),
            datasets:[{label:'إجمالي البيع', data:Object.values(monthlyTotals), fill:false, borderColor:'#1976D2', tension:0.3}]
        },
        options:{responsive:true, plugins:{legend:{display:true}}}
    });
}
</script>
</body>
</html>
