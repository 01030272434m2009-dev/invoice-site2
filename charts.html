<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📈 تحليلات المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
    font-family:'Cairo',sans-serif;
    background:#f2f4f7;
    margin:0;
    padding:20px;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
    color:#1976D2;
    margin-bottom:25px;
}
.chart-container{
    margin:25px 0;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
}
h2{
    text-align:center;
    color:#1976D2;
    margin-bottom:15px;
}
</style>
</head>
<body>
<div class="container">
<h1><i class="fa-solid fa-chart-simple"></i> تحليلات المبيعات</h1>

<div class="chart-container">
<h2>🔥 أفضل 5 أصناف</h2>
<canvas id="topItemsChart" height="150"></canvas>
</div>

<div class="chart-container">
<h2>🍩 نسبة المبيعات</h2>
<canvas id="salesPieChart" height="150"></canvas>
</div>

<div class="chart-container">
<h2>📅 تحليل شهري لإجمالي المبيعات</h2>
<canvas id="monthlyChart" height="150"></canvas>
</div>
</div>

<script>
// ===== دالة لفك Base64 مع دعم الحروف العربية =====
function decodeBase64Unicode(str){
    const bytes=Uint8Array.from(atob(str),c=>c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
}

// ===== الحصول على بيانات من رابط URL =====
function getQueryParam(param){
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

const dataBase64 = getQueryParam('data');

let salesData = [];

if(dataBase64){
    try{
        const jsonStr = decodeBase64Unicode(decodeURIComponent(dataBase64));
        salesData = JSON.parse(jsonStr);
    }catch(e){
        console.error("خطأ في فك البيانات:", e);
        alert("البيانات غير صالحة!");
    }
} else {
    alert("لا توجد بيانات للعرض! تأكد من وجود ?data= في الرابط.");
}

// ===== أفضل 5 أصناف حسب إجمالي البيع =====
const topItems = salesData.sort((a,b)=>parseFloat(b.total)-parseFloat(a.total)).slice(0,5);
const topLabels = topItems.map(i=>i.name);
const topValues = topItems.map(i=>parseFloat(i.total));

const ctxTop = document.getElementById("topItemsChart").getContext("2d");
new Chart(ctxTop,{
    type:'bar',
    data:{
        labels:topLabels,
        datasets:[{
            label:'إجمالي البيع (ج)',
            data:topValues,
            backgroundColor:'#FF9800'
        }]
    },
    options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{
            y:{beginAtZero:true,title:{display:true,text:'إجمالي البيع (ج)'}},
            x:{title:{display:true,text:'اسم الصنف'}}
        }
    }
});

// ===== رسم دائري لنسبة المبيعات لكل صنف =====
const pieLabels = salesData.map(i=>i.name);
const pieValues = salesData.map(i=>parseFloat(i.total));
const pieColors = pieLabels.map(()=>`hsl(${Math.random()*360},70%,60%)`);

const ctxPie = document.getElementById("salesPieChart").getContext("2d");
new Chart(ctxPie,{
    type:'pie',
    data:{
        labels:pieLabels,
        datasets:[{
            data:pieValues,
            backgroundColor:pieColors
        }]
    },
    options:{
        responsive:true,
        plugins:{legend:{position:'right'}}
    }
});

// ===== تحليل شهري لإجمالي المبيعات =====
const monthTotals = Array(12).fill(0);
salesData.forEach(item=>{
    if(item.date){
        const d = new Date(item.date);
        monthTotals[d.getMonth()] += parseFloat(item.total)||0;
    }
});
const monthLabels = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

const ctxMonth = document.getElementById("monthlyChart").getContext("2d");
new Chart(ctxMonth,{
    type:'line',
    data:{
        labels:monthLabels,
        datasets:[{
            label:'إجمالي المبيعات (ج)',
            data:monthTotals,
            borderColor:'#1976D2',
            backgroundColor:'rgba(25,118,210,0.2)',
            fill:true,
            tension:0.3
        }]
    },
    options:{
        responsive:true,
        plugins:{legend:{display:true}},
        scales:{
            y:{beginAtZero:true,title:{display:true,text:'إجمالي البيع (ج)'}},
            x:{title:{display:true,text:'الشهر'}}
        }
    }
});
</script>
</body>
</html>
