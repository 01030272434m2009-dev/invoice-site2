<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🌐 حركة المبيعات</title>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 20px; background: #f5f5f5; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #2196F3; color: #fff; }
        h1 { text-align: center; color: #2196F3; }
        .btn { padding: 8px 16px; background: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>📊 حركة المبيعات</h1>
    <button class="btn" onclick="copyLink()">نسخ الرابط</button>
    <table id="salesTable">
        <thead>
            <tr>
                <th>كود الصنف</th>
                <th>اسم الصنف</th>
                <th>نوع البيع</th>
                <th>طريقة الدفع</th>
                <th>الكمية المباعة</th>
                <th>إجمالي البيع</th>
                <th>الأرباح</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("تم نسخ الرابط!");
        }

        // قراءة البيانات من Base64 JSON
        const dataBase64 = getQueryParam('data');
        if (dataBase64) {
            try {
                const jsonStr = atob(decodeURIComponent(dataBase64));
                const salesData = JSON.parse(jsonStr);
                const tbody = document.querySelector('#salesTable tbody');
                salesData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.code}</td>
                        <td>${item.name}</td>
                        <td>${item.priceMode}</td>
                        <td>${item.payment}</td>
                        <td>${item.qty}</td>
                        <td>${item.total}</td>
                        <td>${item.profit}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (e) {
                console.error("خطأ في فك تشفير البيانات:", e);
                alert("البيانات غير صالحة!");
            }
        }
    </script>
</body>
</html>
